# ─────────────────────────────────────────────────────────────────────────────
# CareerBridge — Add this service to your existing docker-compose.yml
# OR use this as a standalone frontend-only compose file
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerbridge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - careerbridge-net
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080

networks:
  careerbridge-net:
    external: true
