# =============================================================================
#  SonarQube Project Properties – CareerBridge
#  Used by: ./build_monitoring.sh sonar-scan
#  Or manually: sonar-scanner (if sonar-scanner CLI is installed)
# =============================================================================

sonar.projectKey=careerbridge
sonar.projectName=CareerBridge Job Portal
sonar.projectVersion=1.0

# Source directories (all backend microservices)
sonar.sources=backend/auth-service/src/main/java,\
              backend/job-service/src/main/java,\
              backend/application-service/src/main/java,\
              backend/file-service/src/main/java,\
              backend/notification-service/src/main/java,\
              backend/admin-service/src/main/java,\
              backend/api-gateway/src/main/java,\
              backend/eureka-server/src/main/java,\
              backend/config-server/src/main/java

# Test directories
sonar.tests=backend/auth-service/src/test/java,\
            backend/job-service/src/test/java,\
            backend/application-service/src/test/java,\
            backend/file-service/src/test/java,\
            backend/notification-service/src/test/java,\
            backend/admin-service/src/test/java

sonar.java.source=17
sonar.sourceEncoding=UTF-8

# Point to compiled classes for each module
sonar.java.binaries=backend/auth-service/target/classes,\
                    backend/job-service/target/classes,\
                    backend/application-service/target/classes,\
                    backend/file-service/target/classes,\
                    backend/notification-service/target/classes,\
                    backend/admin-service/target/classes,\
                    backend/api-gateway/target/classes,\
                    backend/eureka-server/target/classes,\
                    backend/config-server/target/classes

# JaCoCo coverage reports (generated after: mvn test jacoco:report)
sonar.coverage.jacoco.xmlReportPaths=backend/auth-service/target/site/jacoco/jacoco.xml,\
                                     backend/job-service/target/site/jacoco/jacoco.xml,\
                                     backend/application-service/target/site/jacoco/jacoco.xml,\
                                     backend/file-service/target/site/jacoco/jacoco.xml,\
                                     backend/notification-service/target/site/jacoco/jacoco.xml,\
                                     backend/admin-service/target/site/jacoco/jacoco.xml

# Exclusions
sonar.exclusions=**/generated/**,\
                 **/*Application.java,\
                 **/*Config.java,\
                 **/*Configuration.java,\
                 **/dto/**,\
                 **/entity/**,\
                 **/model/**

sonar.test.exclusions=**/*Test.java,**/*Tests.java

# SonarQube server (matches monitoring stack)
sonar.host.url=http://localhost:9000
