spring:
  application:
    name: notification-service
  config:
    import: ""
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:notification;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

app:
  kafka:
    topics:
      job-events: job-events
      application-events: application-events
      user-events: user-events
