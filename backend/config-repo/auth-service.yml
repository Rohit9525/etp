server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: auth-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

otp:
  expiry-minutes: 10
  requests-per-window: 5
  window-seconds: 600

feign:
  circuitbreaker:
    enabled: true

management:
  prometheus:
    metrics:
      export:
        openmetrics:
          enabled: false
        exemplars:
          enabled: false

app:
  kafka:
    topics:
      user-events: user-events
