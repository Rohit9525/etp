# =============================================================================
#  Grafana – Dashboard Provisioning
#  Loads all dashboards from /var/lib/grafana/dashboards on startup.
# =============================================================================

apiVersion: 1

providers:
  - name: TalentBridge
    orgId: 1
    folder: TalentBridge
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
